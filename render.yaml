services:
  - type: web
    name: wms-warehouse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wms_full:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_APP_TOKEN
        sync: false
